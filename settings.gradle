def managedSmackProjectDir = resolveManagedSmackProjectDir()
def managedSmackVersionFile = new File(managedSmackProjectDir, 'version')
if (!managedSmackVersionFile.exists() || managedSmackVersionFile.text.trim().isEmpty()) {
    throw new GradleException("Managed Smack checkout is missing a usable version file: ${managedSmackVersionFile}")
}
gradle.ext.set('managedSmackVersion', managedSmackVersionFile.text.trim())

includeBuild(managedSmackProjectDir) {
    dependencySubstitution {
        substitute module('org.igniterealtime.smack:smack-core') using project(':smack-core')
        substitute module('org.igniterealtime.smack:smack-im') using project(':smack-im')
        substitute module('org.igniterealtime.smack:smack-tcp') using project(':smack-tcp')
        substitute module('org.igniterealtime.smack:smack-extensions') using project(':smack-extensions')
        substitute module('org.igniterealtime.smack:smack-resolver-minidns') using project(':smack-resolver-minidns')
        substitute module('org.igniterealtime.smack:smack-debug-slf4j') using project(':smack-debug-slf4j')
        substitute module('org.igniterealtime.smack:smack-xmlparser-stax') using project(':smack-xmlparser-stax')
    }
}

