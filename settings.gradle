rootProject.name = 'hermes-wireshare'

def runManagedCommand = { List<String> command, File workingDir = rootDir, boolean ignoreFailure = false ->
    def normalizedCommand = command.collect { it.toString() }
    def process = new ProcessBuilder(normalizedCommand)
        .directory(workingDir)
        .redirectErrorStream(true)
        .start()

    def output = new StringBuilder()
    process.inputStream.eachLine { line ->
        output.append(line).append(System.lineSeparator())
    }

    def exitCode = process.waitFor()
    def result = [exitCode: exitCode, output: output.toString().trim()]

    if (exitCode != 0 && !ignoreFailure) {
        throw new GradleException("Command failed (${normalizedCommand.join(' ')}):\n${result.output}")
    }

    result
}

def refreshManagedGitCheckout = { File managedDir, String defaultBranch, String label ->
    def fetchResult = runManagedCommand(
        ['git', '-C', managedDir.absolutePath, 'fetch', '--depth', '1', 'origin', defaultBranch],
        rootDir,
        true
    )
    if (fetchResult.exitCode != 0) {
        println("[${label}] Unable to refresh ${defaultBranch}; using cached checkout at ${managedDir}")
        return
    }

    def checkoutResult = runManagedCommand(
        ['git', '-C', managedDir.absolutePath, 'checkout', '--force', '-B', 'codex-managed-sync', "origin/${defaultBranch}"],
        rootDir,
        true
    )
    if (checkoutResult.exitCode != 0) {
        println("[${label}] Unable to check out origin/${defaultBranch}; using cached checkout at ${managedDir}")
    }
}

def resolveManagedJlibtorrentProjectDir = {
    def overrideDir = providers.gradleProperty('frostwireJlibtorrentDir').orNull
    if (overrideDir) {
        def explicitDir = file(overrideDir)
        if (!explicitDir.exists()) {
            throw new GradleException("Configured frostwireJlibtorrentDir does not exist: ${explicitDir}")
        }
        return explicitDir
    }

    def repoUrl = providers.gradleProperty('frostwireJlibtorrentRepo')
        .orElse('https://github.com/frostwire/frostwire-jlibtorrent.git')
        .get()
    def managedDir = new File(rootDir, '.gradle/external/frostwire-jlibtorrent')
    def offline = gradle.startParameter.isOffline()
    def gitAvailable = runManagedCommand(['git', '--version'], rootDir, true).exitCode == 0

    def branchOverride = providers.gradleProperty('frostwireJlibtorrentRef').orNull
    def defaultBranch = branchOverride
    if (!defaultBranch && !offline && gitAvailable) {
        def headResult = runManagedCommand(
            ['git', 'ls-remote', '--symref', repoUrl, 'HEAD'],
            rootDir,
            true
        )
        if (headResult.exitCode == 0) {
            def branchLine = headResult.output.readLines().find { it.startsWith('ref: ') && it.endsWith('\tHEAD') }
            if (branchLine != null) {
                def matcher = branchLine =~ /^ref:\s+refs\/heads\/([^\t]+)\tHEAD$/
                if (matcher.matches()) {
                    defaultBranch = matcher.group(1)
                }
            }
        }
    }
    if (!defaultBranch) {
        defaultBranch = 'master'
    }

    if (offline) {
        if (!managedDir.exists()) {
            throw new GradleException(
                "Gradle is offline and no cached frostwire-jlibtorrent checkout exists at ${managedDir}. " +
                    "Run once online or set -PfrostwireJlibtorrentDir=/path/to/frostwire-jlibtorrent."
            )
        }
        return managedDir
    }

    if (!gitAvailable) {
        if (!managedDir.exists()) {
            throw new GradleException(
                "git is required to fetch frostwire-jlibtorrent from ${repoUrl}. " +
                    "Install git or set -PfrostwireJlibtorrentDir=/path/to/frostwire-jlibtorrent."
            )
        }
        println("[jlibtorrent] git unavailable; using cached checkout at ${managedDir}")
        return managedDir
    }

    def ensureCheckout = {
        managedDir.parentFile.mkdirs()
        if (!new File(managedDir, '.git').exists()) {
            if (managedDir.exists()) {
                managedDir.deleteDir()
            }
            println("[jlibtorrent] Cloning ${repoUrl} (${defaultBranch}) into ${managedDir}")
            runManagedCommand(
                ['git', 'clone', '--depth', '1', '--branch', defaultBranch, repoUrl, managedDir.absolutePath],
                rootDir
            )
            return
        }

        refreshManagedGitCheckout(managedDir, defaultBranch, 'jlibtorrent')
    }

    ensureCheckout()

    if (!new File(managedDir, 'build.gradle').exists()) {
        throw new GradleException("Managed frostwire-jlibtorrent checkout is missing build.gradle: ${managedDir}")
    }

    managedDir
}

def managedJlibtorrentProjectDir = resolveManagedJlibtorrentProjectDir()

def resolveManagedJlibtorrentVersion = {
    def explicitVersion = System.getenv('RELEASE_VERSION') ?: System.getenv('GITHUB_REF_NAME')?.replace('release/', '')
    if (explicitVersion) {
        return explicitVersion
    }

    def managedBuildFile = new File(managedJlibtorrentProjectDir, 'build.gradle')
    def matcher = managedBuildFile.text =~ /(?m)version\s*=\s*version\s*=\s*.+?:\s*'([^']+)'/
    if (!matcher.find()) {
        throw new GradleException("Unable to determine managed frostwire-jlibtorrent version from ${managedBuildFile}")
    }

    matcher.group(1)
}

def syncManagedJlibtorrentJniVersion = {
    def managedVersion = resolveManagedJlibtorrentVersion()
    gradle.ext.set('managedJlibtorrentVersion', managedVersion)

    def jniSourceFile = new File(
        managedJlibtorrentProjectDir,
        'src/main/java/com/frostwire/jlibtorrent/swig/libtorrent_jni.java'
    )
    if (!jniSourceFile.exists()) {
        throw new GradleException("Managed frostwire-jlibtorrent checkout is missing ${jniSourceFile}")
    }

    def source = jniSourceFile.getText('UTF-8')
    def matcher = source =~ /(?s)(public\s+static\s+String\s+jlibtorrentVersion\(\)\s*\{\s*.*?return\s+")([^"]+)(";)/ 
    if (!matcher.find()) {
        throw new GradleException("Unable to locate jlibtorrentVersion() in ${jniSourceFile}")
    }

    def currentVersion = matcher.group(2)
    if (currentVersion == managedVersion) {
        return
    }

    def updatedSource = source.replaceFirst(
        /(?s)(public\s+static\s+String\s+jlibtorrentVersion\(\)\s*\{\s*.*?return\s+")([^"]+)(";)/,
        "\$1${managedVersion}\$3"
    )
    jniSourceFile.setText(updatedSource, 'UTF-8')
    println("[jlibtorrent] Synchronized libtorrent_jni.java version ${currentVersion} -> ${managedVersion}")
}

syncManagedJlibtorrentJniVersion()

