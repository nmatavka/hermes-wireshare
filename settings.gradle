def managedGuiceVersionMatcher = managedGuicePom.text =~ /<artifactId>\s*guice-parent\s*<\/artifactId>\s*<version>([^<]+)<\/version>/
if (!managedGuiceVersionMatcher.find()) {
    throw new GradleException("Managed Guice checkout is missing a usable guice-parent version in ${managedGuicePom}")
}
def managedGuiceVersion = managedGuiceVersionMatcher.group(1).trim()
gradle.ext.set('managedGuiceVersion', managedGuiceVersion)

def managedGuiceAdapterDir = new File(rootDir, '.gradle/external/guice-gradle-adapter')
managedGuiceAdapterDir.mkdirs()
new File(managedGuiceAdapterDir, 'guice').mkdirs()
new File(managedGuiceAdapterDir, 'guice-assistedinject').mkdirs()
new File(managedGuiceAdapterDir, 'settings.gradle').text = """rootProject.name = 'managed-guice-adapter'
include 'guice', 'guice-assistedinject'
"""
def quotedGuiceDir = groovy.json.JsonOutput.toJson(managedGuiceProjectDir.absolutePath)
new File(managedGuiceAdapterDir, 'build.gradle').text = """
import org.gradle.api.file.DuplicatesStrategy
import org.gradle.jvm.toolchain.JavaLanguageVersion

plugins {
    id 'java-library'
}

def managedGuiceDir = file(${quotedGuiceDir})

allprojects {
    group = 'com.google.inject'
    version = '${managedGuiceVersion}'

    repositories {
        mavenCentral()
        google()
    }
}

subprojects {
    apply plugin: 'java-library'

    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(21)
        }
        withSourcesJar()
    }

    tasks.withType(JavaCompile).configureEach {
        options.encoding = 'UTF-8'
        options.release = 11
        options.compilerArgs.add('-parameters')
    }

    tasks.withType(Jar).configureEach {
        duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    }
}

project(':guice') {
    sourceSets {
        main {
            java.srcDirs = [new File(managedGuiceDir, 'core/src')]
        }
    }

    dependencies {
        api 'jakarta.inject:jakarta.inject-api:2.0.1'
        api 'aopalliance:aopalliance:1.0'
        api 'com.google.guava:guava:33.0.0-jre'
        implementation 'org.jspecify:jspecify:1.0.0'
        compileOnly 'com.google.code.findbugs:jsr305:3.0.1'
        compileOnly 'com.google.errorprone:error_prone_annotations:2.18.0'
        implementation 'org.ow2.asm:asm:9.5'
    }

    jar {
        manifest {
            attributes('Automatic-Module-Name': 'com.google.guice')
        }
    }
}

project(':guice-assistedinject') {
    group = 'com.google.inject.extensions'

    sourceSets {
        main {
            java.srcDirs = [new File(managedGuiceDir, 'extensions/assistedinject/src')]
        }
    }

    dependencies {
        api project(':guice')
        compileOnly 'com.google.errorprone:error_prone_annotations:2.18.0'
    }

    jar {
        manifest {
            attributes('Automatic-Module-Name': 'com.google.guice.extensions.assistedinject')
        }
    }
}
"""

includeBuild(managedGuiceAdapterDir) {
    dependencySubstitution {
        substitute module('com.google.inject:guice') using project(':guice')
        substitute module('com.google.inject.extensions:guice-assistedinject') using project(':guice-assistedinject')
    }
}

