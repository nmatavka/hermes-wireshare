String toJavaBundleLocaleName(String localeName) {
    if (!localeName.contains('@')) {
        return localeName
    }

    int atIndex = localeName.indexOf('@')
    def baseLocale = localeName.substring(0, atIndex)
    def variant = localeName.substring(atIndex + 1)
    def tokens = new ArrayList<String>(Arrays.asList(baseLocale.split('_', -1)))

    while (tokens.size() < 2) {
        tokens.add('')
    }

    if (tokens.size() == 2) {
        tokens.add(variant)
    } else {
        def existingVariant = tokens.get(tokens.size() - 1)
        tokens.set(tokens.size() - 1, existingVariant ? "${existingVariant}_${variant}" : variant)
    }

    return tokens.join('_')
}

tasks.register('generateMessageBundleClasses') {
    inputs.files(fileTree(messageBundleSourceDir) {
        include '*.po'
    })
    outputs.dir(generatedMessageBundleClassesDir)

    doLast {
        def outputDir = generatedMessageBundleClassesDir.get().asFile
        delete(outputDir)
        outputDir.mkdirs()

        fileTree(messageBundleSourceDir)
            .matching { include '*.po' }
            .files
            .findAll { file -> file.isFile() }
            .sort()
            .each { File poFile ->
                def sourceLocaleName = poFile.name[0..-4]
                def localeName = toJavaBundleLocaleName(sourceLocaleName)
                def command = [
                    'msgfmt',
                    '--java2',
                    '-d', outputDir.absolutePath,
                    '-r', 'org.limewire.i18n.Messages',
                    '-l', localeName,
                    poFile.name,
                ]
                def process = new ProcessBuilder(command)
                    .directory(messageBundleSourceDir)
                    .redirectErrorStream(true)
                    .start()
                def output = new StringBuilder()
                process.inputStream.eachLine { line ->
                    output.append(line).append(System.lineSeparator())
                }
                def exitCode = process.waitFor()
                if (exitCode != 0) {
                    throw new GradleException(
                        "msgfmt failed for ${poFile.name} [locale ${sourceLocaleName} -> ${localeName}] (${command.join(' ')}):\n${output.toString().trim()}"
                    )
                }
            }
    }
}

