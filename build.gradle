def registerMacNativeCompile = { String taskName, String sourceName, String outputName, List<String> frameworks ->
    tasks.register(taskName, Exec) {
        onlyIf { hostOs.isMacOsX() }

        def sourceFile = new File(nativeSourceDir, sourceName)
        def outputFile = nativeOutputDir.map { dir -> new File(dir.asFile, outputName) }

        inputs.file(sourceFile)
        outputs.file(outputFile)

        doFirst {
            outputFile.get().parentFile.mkdirs()
        }

        commandLine(
            'clang',
            '-dynamiclib',
            '-o', outputFile.get().absolutePath,
            '-I', "${javaHomePath.get()}/include",
            '-I', "${javaHomePath.get()}/include/darwin",
            sourceFile.absolutePath,
            *frameworks.collectMany { framework -> ['-framework', framework] }
        )
    }
}

