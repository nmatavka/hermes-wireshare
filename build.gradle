tasks.register('stageLinuxFlatpakFiles', Sync) {
    onlyIf { hostOs.isLinux() && (isX86_64 || isArm64) }
    dependsOn tasks.named('wireShareJar')
    dependsOn tasks.named('buildLinuxFlatpakRuntime')

    into(flatpakFilesDir)
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE

    from(rootProject.layout.projectDirectory.file('WireShare.jar'))
    from(flatpakRuntimeImageDir) {
        into 'jre'
    }
    from(rootDir.toPath().resolve('nativelibs/linux').toFile()) {
        into 'lib64'
        include '*.so'
        include '*.so.*'
    }

    [16, 20, 22, 24, 32, 36, 40, 48, 64, 72, 96, 128, 192, 256, 384, 512, 1024].each { size ->
        from(rootDir.toPath().resolve("main/lib/resources/linux/wsicon_${size}.png").toFile()) {
            into "hicolor/${size}x${size}/apps"
            rename { "${releaseAppId}.png" }
        }
        from(rootDir.toPath().resolve("main/lib/resources/linux/dload_${size}.png").toFile()) {
            into "hicolor/${size}x${size}/status"
            rename { "${releaseAppId}.XferDone.png" }
        }
    }

    doLast {
        def filesDir = flatpakFilesDir.get()
        def launcher = new File(filesDir, 'WireShare.sh')
        launcher.text = """#!/usr/bin/env bash
set -euo pipefail

JAVA_ARGS=()
case "\$(uname -m)" in
  arm64|aarch64)
    JAVA_ARGS+=(${arm64HotSpotOsrWorkaroundArg})
    ;;
esac

exec /app/jre/bin/java "\${JAVA_ARGS[@]}" -Djava.library.path=/app/lib -jar /app/share/${releaseAppName}/WireShare.jar "\$@"
"""
        launcher.setExecutable(true, false)

        def desktopFile = new File(filesDir, "applications/${releaseAppId}.desktop")
        desktopFile.parentFile.mkdirs()
        desktopFile.text = """[Desktop Entry]
Type=Application
Version=1.0
Name=${releaseAppName}
Exec=${releaseAppName} %U
Icon=${releaseAppId}
Terminal=false
Categories=Network;FileTransfer;P2P;
MimeType=application/x-bittorrent;application/torrent;application/x-torrent;x-scheme-handler/magnet;x-scheme-handler/ed2k;
"""
    }
}

