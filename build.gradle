project(':desktop-compose-app') {
    pluginManager.withPlugin('application') {
        dependencies {
            runtimeOnly(files(hostNativeJarFile) {
                builtBy hostNativeJarTask
            })
        }

        tasks.named('run', JavaExec).configure {
            dependsOn hostNativeJarTask

            if (hostOs.isMacOsX()) {
                if (isArm64) {
                    if (macArm64RunJbrJava != null) {
                        // Prefer a locally installed JetBrains Runtime for desktop `run` on Apple Silicon.
                        // Compose Desktop is exercised most heavily against JBR, and Temurin 21.0.11 still
                        // produced intermittent HotSpot crashes across multiple UI/background threads here.
                        executable = macArm64RunJbrJava.absolutePath
                    } else {
                        // Fall back to a maintained Java 21 toolchain instead of inheriting an older host JVM
                        // (for example Oracle 21+35), which has already hit multiple AArch64 HotSpot crashes.
                        javaLauncher = javaToolchains.launcherFor {
                            languageVersion = JavaLanguageVersion.of(javaLanguageVersion)
                            vendor = JvmVendorSpec.ADOPTIUM
                        }
                    }
                }
                dependsOn rootProject.tasks.named('prepareMacRuntimePayload')
                def macRunJvmArgs = [
                    "-Djava.library.path=${macRuntimePayloadDir.get().asFile.toPath().resolve('lib/native').toFile().absolutePath}"
                ]
                if (isArm64) {
                    macRunJvmArgs += arm64HotSpotOsrWorkaroundArg
                    if (macArm64RunUsesTier1Jit) {
                        // Fall back to the simpler C1 tier if the selected runtime still crashes on Apple Silicon.
                        macRunJvmArgs += '-XX:TieredStopAtLevel=1'
                    }
                    if (macArm64RunUsesEd2kCompileExclude) {
                        // Keep the ED2K polling and adapter-refresh path interpreted as an opt-in fallback.
                        macRunJvmArgs += '-XX:CompileCommand=quiet'
                        macRunJvmArgs += "-XX:CompileCommand=exclude,${macArm64RunEd2kCompileExcludePattern}"
                    }
                }
                jvmArgs(macRunJvmArgs)
            }
        }

        if (hostOs.isMacOsX()) {
            tasks.named('startScripts').configure {
                dependsOn rootProject.tasks.named('prepareMacRuntimePayload')
                doLast {
                    def defaultJvmOpts = isArm64
                        ? 'DEFAULT_JVM_OPTS="-Djava.library.path=$APP_HOME/lib/native -XX:-UseOnStackReplacement"'
                        : 'DEFAULT_JVM_OPTS="-Djava.library.path=$APP_HOME/lib/native"'
                    unixScript.text = unixScript.text.replace(
                        'DEFAULT_JVM_OPTS=""',
                        defaultJvmOpts
                    )
                }
            }

            ['distTar', 'distZip', 'installDist'].each { taskName ->
                tasks.named(taskName).configure {
                    dependsOn rootProject.tasks.named('compileMacCompatibilityNatives')
                    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
                }
            }
        }

        distributions {
            main {
                contents {
                    from(hostNativeJarFile) {
                        into 'lib'
                    }
                    if (hostOs.isMacOsX()) {
                        from(macRuntimePayloadDir)
                    }
                    from(rootDir.toPath().resolve('main/lib/resources/linux').toFile()) {
                        into 'resources/linux'
                    }
                    from(rootDir.toPath().resolve('main/lib/resources/osx').toFile()) {
                        into 'resources/osx'
                    }
                    from(rootDir.toPath().resolve('main/lib/resources/windows').toFile()) {
                        into 'resources/windows'
                    }
                }
            }
        }
    }
}

