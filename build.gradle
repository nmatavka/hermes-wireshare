def hygienePatterns = [
    [label: 'legacy factory provider API', token: factoryProviderToken],
    [label: 'Guice internals namespace', token: guiceInternalToken],
    [label: 'Apple desktop extensions jar', token: appleExtensionsToken],
    [label: 'legacy torrent wrapper name', token: torrentWrapperToken],
    [label: 'legacy libtorrent wrapper name', token: libtorrentWrapperToken],
    [label: 'JPMS opens workaround', token: addOpensToken],
]

def vendoredJarDir = rootProject.file('main/lib/jars')
def retiredVendoredJarNames = [
    'MozillaGlue-1.9.jar',
    'MozillaInterfaces-1.9.jar',
    'mozswing.jar',
    'mozdom4java.jar',
    'htmlcleaner-2.1.jar',
    'jdic.jar',
]
def classpathConfigurationsToAudit = [
    'compileClasspath',
    'runtimeClasspath',
    'testCompileClasspath',
    'testRuntimeClasspath',
    'annotationProcessor',
    'testAnnotationProcessor',
]

def hygieneFiles = files(
    fileTree(rootDir) {
        include '**/*.java'
        include '**/*.gradle'
        include '**/*.groovy'
        include '**/*.xml'
        include '**/*.properties'
        include '**/*.sh'
        include '**/*.bat'
        include '**/*.md'
        include '**/*.txt'
        exclude '**/build/**'
        exclude '**/.gradle/**'
        exclude '**/.git/**'
        exclude '**/.ivy2/**'
        exclude '**/frostwire-master/**'
        exclude '**/*.orig'
    },
    rootProject.file('gradlew'),
    rootProject.file('gradlew.bat')
)

tasks.register('verifyDependencyHygiene') {
    group = 'verification'
    description = 'Fails the build if legacy Guice, Apple Java extensions, old libtorrent wrappers, or JPMS opens workarounds are referenced.'
    inputs.files(hygieneFiles)

    doLast {
        def violations = []

        hygieneFiles.files.findAll { it.exists() && it.isFile() }.sort().each { file ->
            String text = file.getText('UTF-8')
            hygienePatterns.each { rule ->
                if (text.contains(rule.token)) {
                    violations << "${rule.label}: ${rootProject.relativePath(file)}"
                }
            }
        }

        if (!violations.isEmpty()) {
            throw new GradleException(
                "Dependency hygiene check failed:\n - " + violations.unique().sort().join('\n - ')
            )
        }
    }
}

tasks.register('verifyNoVendoredJarUsage') {
    group = 'verification'
    description = 'Fails the build if normal module classpaths resolve jars from main/lib/jars or if retired Mozilla/JDIC/HtmlCleaner jars reappear.'

    doLast {
        def violations = []
        def vendoredJarPath = vendoredJarDir.toPath().toAbsolutePath().normalize()

        retiredVendoredJarNames.collect { new File(vendoredJarDir, it) }
            .findAll { it.exists() }
            .each { file ->
                violations << "retired vendored jar still present: ${rootProject.relativePath(file)}"
            }

        subprojects.sort { it.path }.each { proj ->
            classpathConfigurationsToAudit.each { configurationName ->
                def configuration = proj.configurations.findByName(configurationName)
                if (configuration == null || !configuration.canBeResolved) {
                    return
                }

                configuration.resolve().sort { it.absolutePath }.each { file ->
                    def resolvedPath = file.toPath().toAbsolutePath().normalize()
                    if (resolvedPath.startsWith(vendoredJarPath)) {
                        violations << "${proj.path}:${configurationName} -> ${rootProject.relativePath(file)}"
                    }
                }
            }
        }

        if (!violations.isEmpty()) {
            throw new GradleException(
                "Vendored jar usage check failed:\n - " + violations.unique().sort().join('\n - ')
            )
        }
    }
}

def legacySwingBuildFiles = files(
    rootProject.file('settings.gradle'),
    rootProject.file('build.gradle')
)

tasks.register('verifyNoLegacySwingBuildWiring') {
    group = 'verification'
    description = 'Fails when removed Swing build wiring is reintroduced.'
    inputs.files(legacySwingBuildFiles)

    doLast {
        def violations = []
        def forbiddenPatterns = [
            [label: ':swingui module', pattern: /'swingui'\s*:/],
            [label: ':integrated-ui module', pattern: /'integrated-ui'\s*:/],
            [label: 'runSwing task', pattern: /tasks\.register\(['"]runSwing['"]/],
            [label: 'legacy Swing module block', pattern: /project\(':integrated-ui'\)\s*\{/],
            [label: 'legacy Swing main class', pattern: /mainClass\s*=\s*['"]org\.limewire\.ui\.swing\.Main['"]/],
        ]

        legacySwingBuildFiles.files.findAll { it.exists() && it.isFile() }.sort().each { file ->
            String text = file.getText('UTF-8')
            forbiddenPatterns.each { entry ->
                if ((text =~ entry.pattern).find()) {
                    violations << "${entry.label}: ${rootProject.relativePath(file)}"
                }
            }
        }

        if (!violations.isEmpty()) {
            throw new GradleException(
                "Legacy Swing build wiring check failed:\n - " + violations.unique().sort().join('\n - ')
            )
        }
    }
}

tasks.register('verifyNoJmuleBuildDependency') {
    group = 'verification'
    description = 'Fails if the active build still depends on the donor jmule source tree.'

    def trackedFiles = files(
        rootProject.file('settings.gradle'),
        rootProject.file('build.gradle'),
        rootProject.file('desktop-compose-app/build.gradle'),
        rootProject.file('ed2k-api/build.gradle'),
        rootProject.file('ed2k-backend/build.gradle')
    )
    inputs.files(trackedFiles)

    doLast {
        def violations = []
        def forbiddenProjectToken = "project(':j" + "mule')"
        trackedFiles.files.findAll { it.exists() && it.isFile() }.sort().each { file ->
            String text = file.getText('UTF-8')
            if (text.contains(forbiddenProjectToken)) {
                violations << "${rootProject.relativePath(file)} still references :jmule"
            }
        }

        if (rootProject.file('jmule/build.gradle').exists()) {
            violations << 'jmule/build.gradle exists, but jmule must remain a donor-only folder'
        }

        if (!violations.isEmpty()) {
            throw new GradleException(
                "JMule donor boundary check failed:\n - " + violations.unique().sort().join('\n - ')
            )
        }
    }
}

