tasks.register('signWindowsMsi') {
    onlyIf { hostOs.isWindows() && isX86_64 && windowsSigningConfigured }
    dependsOn tasks.named('packageWindowsMsi')

    doLast {
        def msiFiles = fileTree(windowsMsiDir.get().asFile).matching {
            include '*.msi'
        }.files.sort()
        if (msiFiles.isEmpty()) {
            throw new GradleException("No MSI files were produced in ${windowsMsiDir.get().asFile}")
        }

        msiFiles.each { File msiFile ->
            def command = [
                windowsSignToolPath.orNull ?: 'signtool',
                'sign',
                '/fd', 'SHA256',
                '/tr', windowsTimestampUrl.get(),
                '/td', 'SHA256',
            ]
            if (windowsCodesignCertificatePath.isPresent()) {
                command += ['/f', windowsCodesignCertificatePath.get()]
                if (windowsCodesignCertificatePassword.isPresent()) {
                    command += ['/p', windowsCodesignCertificatePassword.get()]
                }
            } else {
                command += ['/sha1', windowsCodesignCertificateThumbprint.get()]
            }
            command += [msiFile.absolutePath]
            exec {
                commandLine(command)
            }
        }
    }
}

