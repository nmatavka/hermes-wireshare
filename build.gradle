tasks.register('packageMacAppImage', Exec) {
    onlyIf { hostOs.isMacOsX() }
    dependsOn tasks.named('stageMacAppInput')

    def outputDir = macAppImageDir.get().asFile
    def inputDir = macAppInputDir.get().asFile
    def jpackageBinary = new File(javaHomePath.get(), 'bin/jpackage').absolutePath
    def iconFile = rootDir.toPath().resolve('main/lib/resources/osx/wireshare.icns').toFile()

    doFirst {
        delete(outputDir)
        outputDir.mkdirs()
    }

    def command = [
        jpackageBinary,
        '--type', 'app-image',
        '--dest', outputDir.absolutePath,
        '--input', inputDir.absolutePath,
        '--name', 'WireShare',
        '--main-jar', 'WireShare.jar',
        '--app-version', project.version.toString(),
        '--vendor', 'Hermes',
        '--mac-package-identifier', 'com.wireshare.gnutella',
        '--icon', iconFile.absolutePath,
    ]
    if (macosCodesignIdentity.isPresent()) {
        command += ['--mac-sign', '--mac-signing-key-user-name', macosCodesignIdentity.get()]
        if (macosCodesignKeychain.isPresent()) {
            command += ['--mac-signing-keychain', macosCodesignKeychain.get()]
        }
    }
    commandLine(command)
}

tasks.register('zipMacAppImageForNotarization', Exec) {
    onlyIf { hostOs.isMacOsX() }
    dependsOn tasks.named('packageMacAppImage')

    def appBundle = macAppImageDir.map { dir -> new File(dir.asFile, 'WireShare.app') }
    def zipFile = macNotaryZipFile.get().asFile

    doFirst {
        zipFile.parentFile.mkdirs()
        zipFile.delete()
    }

    commandLine(
        'ditto',
        '-c',
        '-k',
        '--keepParent',
        appBundle.get().absolutePath,
        zipFile.absolutePath
    )
}

tasks.register('notarizeMacAppImage') {
    onlyIf {
        hostOs.isMacOsX() &&
            macosCodesignIdentity.isPresent() &&
            macosNotaryProfile.isPresent()
    }
    dependsOn tasks.named('zipMacAppImageForNotarization')

    doLast {
        def zipFile = macNotaryZipFile.get().asFile
        def appBundle = macAppImageDir.get().asFile.toPath().resolve('WireShare.app').toFile()

        exec {
            commandLine(
                'xcrun',
                'notarytool',
                'submit',
                zipFile.absolutePath,
                '--wait',
                '--keychain-profile',
                macosNotaryProfile.get()
            )
        }
        exec {
            commandLine('xcrun', 'stapler', 'staple', appBundle.absolutePath)
        }
    }
}

