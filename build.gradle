configure(subprojects.findAll { !['jlibtorrent', 'android-app', 'desktop-compose-app'].contains(it.name) }) {
    apply plugin: 'java-library'

    group = 'org.limewire'
    version = '7.0'

    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(javaLanguageVersion)
        }
        withSourcesJar()
    }

    sourceSets {
        main {
            java.setSrcDirs(['src/main/java'])
            resources.setSrcDirs(['src/main/resources'])
            if (project.name == 'core-glue') {
                java.exclude('org/limewire/core/impl/mozilla/**')
            }
            if (project.name == 'gnutella-core') {
                java.exclude('com/limegroup/gnutella/daap/**')
                java.exclude('com/limegroup/gnutella/util/FECUtilsImpl.java')
            }
            if (project.name == 'swingui') {
                java.exclude('org/limewire/ui/swing/browser/**')
                java.exclude('org/limewire/ui/swing/home/**')
            }
        }
        test {
            java.setSrcDirs(['src/test/java'])
            resources.setSrcDirs(['src/test/resources'])
        }
    }

    tasks.withType(JavaCompile).configureEach {
        options.encoding = 'UTF-8'
        options.release = javaLanguageVersion
        options.compilerArgs.add('-Xlint:unchecked')
    }

    tasks.withType(Jar).configureEach {
        duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    }

    dependencies {
        implementation "com.google.inject:guice:${managedGuiceVersion}"
        implementation "com.google.inject.extensions:guice-assistedinject:${managedGuiceVersion}"
        implementation 'javax.inject:javax.inject:1'
        implementation 'aopalliance:aopalliance:1.0'
        implementation 'net.java.dev.jna:jna:5.14.0'
        testImplementation 'junit:junit:4.13.2'
    }

    afterEvaluate { Project componentProject ->
        limewireProjectDependencies(componentProject).each { dependencyName ->
            componentProject.dependencies.add('implementation', project(":${dependencyName}"))
        }
        legacyExternalDependencies(componentProject).each { dependency ->
            componentProject.dependencies.add(dependency.scope ?: 'implementation', dependency.notation)
        }
    }
}

