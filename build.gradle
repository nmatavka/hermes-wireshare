import groovy.xml.XmlSlurper
import java.util.regex.Pattern

plugins {
    id 'base'
}

group = 'org.wireshare'
version = '0.1.0-SNAPSHOT'

def dependencyProps = new Properties()
file('main/components/common/dependencies.props').withInputStream { dependencyProps.load(it) }

def localJarRoot = file('main/lib/jars')
def localJarFiles = localJarRoot.exists() ? fileTree(localJarRoot) {
    include '**/*.jar'
}.files.toList() : []

def localJarIndex = localJarFiles.groupBy { it.name }

ext.guiceCoordinates = [
        guice               : 'com.google.inject:guice:6.0.0',
        'guice-assistedinject': 'com.google.inject.extensions:guice-assistedinject:6.0.0'
]

ext.resolveRevision = { String rawRevision ->
    if (!rawRevision) {
        return rawRevision
    }

    def matcher = rawRevision =~ /\$\{([^}]+)\}/
    if (!matcher.find()) {
        return rawRevision
    }

    String resolved = rawRevision
    matcher.reset()
    matcher.each { fullMatch, propertyName ->
        resolved = resolved.replace(fullMatch, dependencyProps.getProperty(propertyName, ''))
    }
    return resolved
}

ext.findLocalJar = { String depName, String revision ->
    String normalized = depName.replace('\\', '/')
    String leaf = normalized.tokenize('/').last()
    List<String> exactCandidates = []
    if (revision) {
        exactCandidates << "${normalized}-${revision}.jar"
    }
    exactCandidates << "${normalized}.jar"

    for (String candidate : exactCandidates) {
        File jar = new File(localJarRoot, candidate)
        if (jar.exists()) {
            return jar
        }
    }

    List<String> nameCandidates = []
    if (revision) {
        nameCandidates << "${leaf}-${revision}.jar"
    }
    nameCandidates << "${leaf}.jar"

    for (String candidate : nameCandidates.unique()) {
        List<File> jars = localJarIndex[candidate]
        if (jars) {
            return jars.first()
        }
    }

    return null
}

ext.wireShareModule = { String moduleName ->
    Project moduleProject = findProject(":${moduleName}")
    if (moduleProject == null) {
        throw new GradleException("Unknown module dependency '${moduleName}'")
    }
    return moduleProject
}

def hasCompileConfiguration = { String conf ->
    conf?.split(',')?.collect { it.trim() }?.contains('compile')
}

def hasRuntimeConfiguration = { String conf ->
    conf?.split(',')?.collect { it.trim() }?.contains('runtime')
}

allprojects {
    group = rootProject.group
    version = rootProject.version

    repositories {
        mavenCentral()
    }
}

subprojects { Project subproject ->
    if (subproject.name == 'jlibtorrent') {
        return
    }

    if (!subproject.file('ivy.xml').exists()) {
        return
    }

    apply plugin: 'java-library'

    java {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
        withSourcesJar()
    }

    tasks.withType(JavaCompile).configureEach {
        options.encoding = 'UTF-8'
        options.release = 17
        options.compilerArgs += ['-Xlint:unchecked']
    }

    sourceSets {
        main {
            java.srcDirs = ['src/main/java']
            resources.srcDirs = ['src/main/resources']
        }
        test {
            java.srcDirs = ['src/test/java']
            resources.srcDirs = ['src/test/resources']
        }
    }

    tasks.withType(ProcessResources).configureEach {
        duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    }

    dependencies {
        if (subproject.name == 'common') {
            api guiceCoordinates['guice-assistedinject']
        }

        if (subproject.name == 'libtorrent') {
            api project(':jlibtorrent')
        }
    }

    XmlSlurper parser = new XmlSlurper()
    def ivy = parser.parse(subproject.file('ivy.xml'))
    ivy.dependencies.dependency.each { dep ->
        String orgName = dep.@org.text()
        String depName = dep.@name.text()
        String revision = resolveRevision(dep.@rev.text())
        String conf = dep.@conf.text()

        boolean compileScope = hasCompileConfiguration(conf)
        boolean runtimeScope = hasRuntimeConfiguration(conf)

        if (orgName == 'org.limewire') {
            def dependencyNotation = project(":${depName}")
            if (compileScope) {
                subproject.dependencies.add('api', dependencyNotation)
            }
            if (runtimeScope && !compileScope) {
                subproject.dependencies.add('runtimeOnly', dependencyNotation)
            }
            return
        }

        if (orgName != 'none') {
            return
        }

        if (depName == 'compile/AppleJavaExtensions') {
            return
        }

        if (guiceCoordinates.containsKey(depName)) {
            if (compileScope) {
                subproject.dependencies.add('api', guiceCoordinates[depName])
            }
            if (runtimeScope && !compileScope) {
                subproject.dependencies.add('runtimeOnly', guiceCoordinates[depName])
            }
            return
        }

        File localJar = findLocalJar(depName, revision)
        if (localJar == null) {
            String message = "Unable to resolve local dependency '${depName}' for project '${subproject.name}'"
            if (compileScope) {
                throw new GradleException(message)
            }
            logger.warn(message)
            return
        }

        if (compileScope) {
            subproject.dependencies.add('api', subproject.files(localJar))
        }
        if (runtimeScope && !compileScope) {
            subproject.dependencies.add('runtimeOnly', subproject.files(localJar))
        }
    }
}

project(':integrated-ui') {
    apply plugin: 'application'

    application {
        mainClass = 'org.limewire.ui.swing.Main'
    }

    tasks.named('run', JavaExec).configure {
        jvmArgs '-Djava.awt.headless=false'
    }
}

def hostOs = org.gradle.internal.os.OperatingSystem.current()
if (hostOs.isMacOsX()) {
    def javaHomeDir = new File(System.getProperty('java.home'))
    def jniIncludeDir = new File(javaHomeDir, 'include')
    def jniDarwinDir = new File(jniIncludeDir, 'darwin')
    def macNativeOutputDir = layout.buildDirectory.dir('natives/macos').get().asFile
    def macArch = (System.getProperty('os.arch').toLowerCase() in ['aarch64', 'arm64']) ? 'arm64'
            : 'x86_64'

    tasks.register('compileMacOSXUtilsDylib', Exec) {
        def sourceFile = file('main/components/common/src/main/native/osx/MacOSXUtils.m')
        def outputFile = new File(macNativeOutputDir, 'libMacOSXUtils.dylib')
        inputs.file(sourceFile)
        outputs.file(outputFile)
        doFirst {
            outputFile.parentFile.mkdirs()
        }
        commandLine 'clang',
                '-dynamiclib',
                '-arch', macArch,
                '-I', jniIncludeDir.absolutePath,
                '-I', jniDarwinDir.absolutePath,
                '-framework', 'Cocoa',
                '-framework', 'CoreServices',
                '-o', outputFile.absolutePath,
                sourceFile.absolutePath
    }

    tasks.register('compileSystemUtilitiesDylib', Exec) {
        def sourceFile = file('main/components/common/src/main/native/osx/SystemUtilities.m')
        def outputFile = new File(macNativeOutputDir, 'libSystemUtilities.dylib')
        inputs.file(sourceFile)
        outputs.file(outputFile)
        doFirst {
            outputFile.parentFile.mkdirs()
        }
        commandLine 'clang',
                '-dynamiclib',
                '-arch', macArch,
                '-I', jniIncludeDir.absolutePath,
                '-I', jniDarwinDir.absolutePath,
                '-framework', 'ApplicationServices',
                '-o', outputFile.absolutePath,
                sourceFile.absolutePath
    }

    tasks.register('buildMacJni') {
        dependsOn tasks.named('compileMacOSXUtilsDylib')
        dependsOn tasks.named('compileSystemUtilitiesDylib')
    }

    project(':integrated-ui') {
        tasks.named('run', JavaExec).configure {
            dependsOn rootProject.tasks.named('buildMacJni')
            jvmArgs "-Djava.library.path=${macNativeOutputDir.absolutePath}"
        }
    }

    tasks.named('assemble').configure {
        dependsOn tasks.named('buildMacJni')
    }
}

tasks.register('verifyModernizationGuards') {
    group = 'verification'
    description = 'Fails if deprecated Guice or macOS migration regressions reappear.'

    List<Map<String, Object>> checks = [
            [pattern: ~/com\.google\.inject\.internal\./, message: 'Internal Guice APIs are forbidden'],
            [pattern: ~/FactoryProvider\.newFactory\(/, message: 'FactoryProvider.newFactory is forbidden'],
            [pattern: ~/com\.apple\.eawt/, message: 'com.apple.eawt is forbidden'],
            [pattern: ~/AppleJavaExtensions/, message: 'AppleJavaExtensions is forbidden'],
            [pattern: ~/--add-opens/, message: '--add-opens is forbidden']
    ]

    doLast {
        List<String> failures = []
        fileTree(rootDir) {
            include '**/*.java', '**/*.gradle', '**/*.gradle.kts', '**/*.xml', '**/*.properties', '**/*.sh'
            exclude '**/build/**', '**/.gradle/**', '**/.git/**', 'jlibtorrent/build/**',
                    '**/ivy.xml', '**/ivy.xml.orig', '**/dependencies.props', '**/dependencies.props.orig',
                    'build.gradle'
        }.each { File candidate ->
            String text = candidate.getText('UTF-8')
            checks.each { check ->
                Pattern pattern = check.pattern as Pattern
                if (pattern.matcher(text).find()) {
                    failures << "${check.message}: ${candidate}"
                }
            }
        }

        if (!failures.isEmpty()) {
            throw new GradleException(failures.join('\n'))
        }
    }
}

tasks.named('check').configure {
    dependsOn tasks.named('verifyModernizationGuards')
}
