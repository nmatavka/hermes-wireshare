project(':jlibtorrent') {
    tasks.withType(Test).configureEach {
        def sourceNativeTaskName = hostJlibtorrentNativeTaskName()
        def sourceNativeTask = managedJlibtorrentUsePublishedNatives ? null : tasks.named(sourceNativeTaskName)
        def sourceNativeJarFile = managedJlibtorrentUsePublishedNatives
            ? null
            : sourceNativeTask.flatMap { archiveTask -> archiveTask.archiveFile }
        def resolvedNativeTask = managedJlibtorrentUsePublishedNatives
            ? rootProject.tasks.named('downloadManagedJlibtorrentHostNativeJar')
            : sourceNativeTask
        def resolvedNativeJarFile = managedJlibtorrentUsePublishedNatives
            ? rootProject.layout.buildDirectory.file("managed-jlibtorrent/${hostJlibtorrentNativeArtifactName(gradle.ext.managedJlibtorrentVersion.toString())}")
            : sourceNativeJarFile

        dependsOn resolvedNativeTask
        onlyIf {
            if (managedJlibtorrentUsePublishedNatives) {
                logger.lifecycle(
                    "Skipping ${path} because managed frostwire-jlibtorrent release natives are used for packaging, not for running upstream JNI tests on this machine."
                )
                return false
            }

            def nativeJar = resolvedNativeJarFile.get().asFile
            if (nativeJar.exists()) {
                return true
            }

            logger.lifecycle(
                managedJlibtorrentUsePublishedNatives
                    ? "Skipping ${path} because the managed frostwire-jlibtorrent release asset ${nativeJar.name} is unavailable for this machine."
                    : "Skipping ${path} because ${nativeJar.name} was not produced by ${project.path}:${sourceNativeTaskName}. " +
                        "The managed frostwire-jlibtorrent checkout does not include host native binaries for this machine."
            )
            false
        }
    }
}

tasks.register('stageMacRuntimePayload', Sync) {
    onlyIf { hostOs.isMacOsX() }
    dependsOn tasks.named('compileMacCompatibilityNatives')
    dependsOn hostNativeJarTask

    into(macRuntimePayloadDir)
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE

    from(nativeOutputDir) {
        into 'lib/native'
    }
    from(rootDir.toPath().resolve('nativelibs/osx').toFile()) {
        into 'lib/native'
        include '*.dylib'
        include '*.jnilib'
    }
    from({
        def nativeJar = hostNativeJarFile.get().asFile
        if (!nativeJar.exists()) {
            return []
        }
        return zipTree(nativeJar).matching {
            include '**/*.dylib'
            include '**/*.jnilib'
        }
    })
}

tasks.register('signMacRuntimePayload') {
    onlyIf { hostOs.isMacOsX() && macosCodesignIdentity.isPresent() }
    dependsOn tasks.named('stageMacRuntimePayload')
    inputs.dir(macRuntimePayloadDir)
    outputs.dir(macRuntimePayloadDir)

    doLast {
        def identity = macosCodesignIdentity.get()
        def keychain = macosCodesignKeychain.orNull
        def binaries = fileTree(macRuntimePayloadDir.get().asFile).matching {
            include '**/*.dylib'
            include '**/*.jnilib'
        }.files.sort()

        binaries.each { File binary ->
            def command = ['codesign', '--force', '--sign', identity, '--timestamp']
            if (keychain) {
                command += ['--keychain', keychain]
            }
            command += [binary.absolutePath]
            exec {
                commandLine(command)
            }
        }
    }
}

tasks.register('prepareMacRuntimePayload') {
    onlyIf { hostOs.isMacOsX() }
    dependsOn(macosCodesignIdentity.isPresent()
        ? tasks.named('signMacRuntimePayload')
        : tasks.named('stageMacRuntimePayload'))
}

tasks.register('verifyMacRuntimePayloadSignatures') {
    onlyIf { hostOs.isMacOsX() && macosCodesignIdentity.isPresent() }
    dependsOn tasks.named('signMacRuntimePayload')

    doLast {
        fileTree(macRuntimePayloadDir.get().asFile).matching {
            include '**/*.dylib'
            include '**/*.jnilib'
        }.files.sort().each { File binary ->
            exec {
                commandLine('codesign', '--verify', '--strict', '--verbose=2', binary.absolutePath)
            }
        }
    }
}

tasks.register('stageMacAppInput', Sync) {
