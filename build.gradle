def ivyDependenciesForOrg = { Project project, String organization ->
    File ivyFile = project.file('ivy.xml')
    if (!ivyFile.exists()) {
        return []
    }

    def ivy = new XmlSlurper().parse(ivyFile)
    ivy.dependencies.dependency
        .findAll { dependency -> dependency.@org.text() == organization }
        .collect { dependency -> dependency.@name.text() }
        .findAll { dependencyName -> dependencyName }
        .unique()
}

def limewireProjectDependencies = { Project project ->
    ivyDependenciesForOrg(project, 'org.limewire')
        .findAll { dependencyName -> dependencyName && dependencyName != project.name }
}

def legacyExternalDependencies = { Project project ->
    ivyDependenciesForOrg(project, 'none').collectMany { dependencyName ->
        if (legacySkippedDependencies.contains(dependencyName)) {
            return []
        }

        def definition = legacyExplicitArtifacts[dependencyName]
        if (definition == null) {
            throw new GradleException("No explicit replacement declared for legacy Ivy dependency '${dependencyName}' in ${project.path}")
        }

        if (definition instanceof Map) {
            return [definition + [name: dependencyName]]
        }

        return [[name: dependencyName, scope: 'implementation', notation: definition]]
    }
}

def hostJlibtorrentNativeTaskName = {
    if (hostOs.isMacOsX()) {
        return isArm64 ? 'nativeMacOSArm64Jar' : 'nativeMacOSX86_64Jar'
    }
    if (hostOs.isLinux()) {
        return isArm64 ? 'nativeLinuxArm64Jar' : 'nativeLinuxX86_64Jar'
    }
    if (hostOs.isWindows()) {
        return 'nativeWindowsX86_64Jar'
    }
    throw new GradleException("Unsupported host platform for jlibtorrent natives: ${hostOs.name()}/${hostArch}")
}

