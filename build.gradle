def hostJlibtorrentNativeArtifactName = { String version ->
    if (hostOs.isMacOsX()) {
        return isArm64
            ? "jlibtorrent-macosx-arm64-${version}.jar"
            : "jlibtorrent-macosx-x86_64-${version}.jar"
    }
    if (hostOs.isLinux()) {
        return isArm64
            ? "jlibtorrent-linux-arm64-${version}.jar"
            : "jlibtorrent-linux-x86_64-${version}.jar"
    }
    if (hostOs.isWindows()) {
        return "jlibtorrent-windows-${version}.jar"
    }
    throw new GradleException("Unsupported host platform for jlibtorrent native artifact: ${hostOs.name()}/${hostArch}")
}

