project(':jlibtorrent') {
    def hostNativeTaskName = hostJlibtorrentNativeTaskName()
    def hostNativeTask = tasks.named(hostNativeTaskName)
    def hostNativeJarFile = hostNativeTask.flatMap { archiveTask -> archiveTask.archiveFile }

    tasks.withType(Test).configureEach {
        dependsOn hostNativeTask
        onlyIf {
            def nativeJar = hostNativeJarFile.get().asFile
            if (nativeJar.exists()) {
                return true
            }

            logger.lifecycle(
                "Skipping ${path} because ${nativeJar.name} was not produced by ${project.path}:${hostNativeTaskName}. " +
                    "The managed frostwire-jlibtorrent checkout does not include host native binaries for this machine."
            )
            false
        }
    }
}

