def managedJlibtorrentNativeAssetName = hostJlibtorrentNativeArtifactName(gradle.ext.managedJlibtorrentVersion.toString())
def managedJlibtorrentNativeAssetUrl = managedJlibtorrentReleaseAssets[managedJlibtorrentNativeAssetName]?.toString()
def managedJlibtorrentNativeAssetFile = layout.buildDirectory.file("managed-jlibtorrent/${managedJlibtorrentNativeAssetName}")

tasks.register('downloadManagedJlibtorrentHostNativeJar') {
    onlyIf { managedJlibtorrentUsePublishedNatives }
    outputs.file(managedJlibtorrentNativeAssetFile)

    doLast {
        def targetFile = managedJlibtorrentNativeAssetFile.get().asFile
        if (targetFile.exists() && !gradle.startParameter.refreshDependencies) {
            return
        }
        if (gradle.startParameter.isOffline()) {
            throw new GradleException(
                "Gradle is offline and ${targetFile.name} has not been cached yet. " +
                    "Run once online to download the managed frostwire-jlibtorrent native jar."
            )
        }
        if (!managedJlibtorrentNativeAssetUrl) {
            throw new GradleException(
                "No published frostwire-jlibtorrent native asset URL was resolved for ${managedJlibtorrentNativeAssetName}. " +
                    "Use -PfrostwireJlibtorrentSourceHead=true to opt into source-head mode if you need local native builds."
            )
        }

        targetFile.parentFile.mkdirs()
        def connection = new URL(managedJlibtorrentNativeAssetUrl).openConnection()
        connection.setRequestProperty('User-Agent', 'WireShare-Gradle')
        connection.setConnectTimeout(15000)
        connection.setReadTimeout(30000)
        connection.inputStream.withCloseable { stream ->
            targetFile.withOutputStream { output ->
                output << stream
            }
        }
    }
}

